<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StructTech OS</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PptxGenJS/3.12.0/pptxgen.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --orange-dim:rgba(249,115,22,0.12); --green-dim:rgba(34,197,94,0.12);
      --bg:#0a0f1e; --card:#111827; --card2:#0f172a; --border:#1e293b; --orange:#f97316;
      --orange-hl:#fb923c; --orange-dim:rgba(249,115,22,0.12); --blue:#3b82f6; --green:#22c55e;
      --green-dim:rgba(34,197,94,0.12); --red:#ef4444; --white:#f8fafc; --gray:#94a3b8; --muted:#64748b;
      --mono:'DM Mono',monospace; --head:'Bebas Neue',sans-serif; --body:'DM Sans',sans-serif; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--white); font-family:var(--body); min-height:100vh; }
    button { font-family:var(--body); cursor:pointer; }

    /* ---- GATE ---- */
    #gate { position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center; }
    .gate-box { width:320px; text-align:center; }
    .gate-box h1 { font-family:var(--head); font-size:30px; letter-spacing:0.05em; }
    .gate-box h1 span { color:var(--orange); }
    .gate-box p { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:0.16em; margin:4px 0 20px; }
    .gate-box input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px;
      color:var(--white); font-size:15px; padding:13px 14px; outline:none; text-align:center; }
    .gate-box input:focus { border-color:var(--orange); }
    .gate-box button { width:100%; margin-top:10px; background:var(--orange); border:none; color:#fff;
      font-weight:700; font-size:14px; padding:13px; border-radius:10px; }
    .gate-err { color:var(--red); font-size:12px; margin-top:10px; min-height:14px; }

    /* ---- SHELL ---- */
    #app { display:none; }
    .shell { display:flex; min-height:100vh; }
    .side { width:200px; flex-shrink:0; background:var(--card2); border-right:1px solid var(--border);
      padding:22px 14px; position:sticky; top:0; height:100vh; }
    .side .logo { font-family:var(--head); font-size:20px; letter-spacing:0.05em; padding:0 8px 18px; }
    .side .logo span { color:var(--orange); }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:9px;
      font-size:13px; font-weight:600; color:var(--gray); cursor:pointer; margin-bottom:4px; border:none; background:none; width:100%; text-align:left; }
    .nav-item:hover { background:var(--card); color:var(--white); }
    .nav-item.on { background:var(--orange-dim); color:var(--orange); }
    .nav-item.soon { opacity:0.4; cursor:default; }
    .nav-item.soon:hover { background:none; color:var(--gray); }
    .nav-item .tag { font-family:var(--mono); font-size:8px; letter-spacing:0.08em; background:var(--card); padding:2px 6px; border-radius:99px; margin-left:auto; }
    .main { flex:1; padding:26px 28px 80px; min-width:0; }
    .page-title { font-family:var(--head); font-size:28px; letter-spacing:0.04em; margin-bottom:2px; }
    .page-sub { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:0.14em; margin-bottom:20px; }

    /* ---- STAT CARDS ---- */
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:22px; }
    .stat { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
    .stat .n { font-family:var(--head); font-size:28px; color:var(--orange); }
    .stat .l { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:0.12em; }

    /* ---- TABLE ---- */
    .toolbar { display:flex; gap:10px; margin-bottom:14px; }
    .toolbar input { flex:1; background:var(--card); border:1px solid var(--border); border-radius:9px;
      color:var(--white); font-size:13px; padding:10px 14px; outline:none; }
    .toolbar input:focus { border-color:var(--orange); }
    table { width:100%; border-collapse:collapse; }
    th { font-family:var(--mono); font-size:9px; letter-spacing:0.12em; color:var(--muted); text-align:left;
      padding:8px 10px; border-bottom:1px solid var(--border); }
    td { padding:12px 10px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
    tr.row { cursor:pointer; }
    tr.row:hover td { background:rgba(255,255,255,0.02); }
    .pill { display:inline-block; font-family:var(--mono); font-size:9px; letter-spacing:0.08em; padding:3px 9px; border-radius:99px; }
    .pill.crit { background:rgba(239,68,68,0.14); color:#f87171; }
    .pill.high { background:var(--orange-dim); color:var(--orange-hl); }
    .pill.mod  { background:rgba(234,179,8,0.14); color:#facc15; }
    .pill.low  { background:var(--green-dim); color:var(--green); }
    .pill.blue { background:rgba(59,130,246,0.14); color:var(--blue); }
    .pill.muted { background:var(--card2); color:var(--muted); }

    /* schedule panel */
    .sch-lvl { background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:10px; }
    .sch-lvl-top { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .sch-lvl-top b { flex:1; font-size:13px; }
    .sch-lvl-dates { display:flex; gap:6px; align-items:center; margin-top:8px; }
    .sch-lvl-dates label { font-family:var(--mono); font-size:9px; color:var(--muted); }
    .sch-ms { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:12.5px; border-top:1px solid var(--border); margin-top:8px; }
    .sch-ms .done-t { width:22px; height:22px; border-radius:6px; border:2px solid var(--muted); flex-shrink:0;
      display:flex; align-items:center; justify-content:center; cursor:pointer; color:transparent; font-size:12px; background:none; }
    .sch-ms .done-t.y { background:var(--green); border-color:var(--green); color:#fff; }
    .sch-ms .win { color:var(--orange); }
    .sch-ci { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--border); font-size:12.5px; }
    .score-chip { font-family:var(--mono); font-size:12px; }
    .muted { color:var(--muted); }
    .empty { text-align:center; color:var(--muted); padding:50px 0; font-size:14px; }

    /* ---- DETAIL / EDITOR ---- */
    .back { background:none; border:none; color:var(--gray); font-family:var(--mono); font-size:11px; letter-spacing:0.1em; padding:0; margin-bottom:16px; }
    .back:hover { color:var(--orange); }
    .detail-hd { display:flex; flex-wrap:wrap; gap:16px; align-items:center; background:var(--card); border:1px solid var(--border);
      border-radius:14px; padding:18px 20px; margin-bottom:18px; }
    .detail-hd .who h2 { font-size:20px; font-weight:700; }
    .detail-hd .who .sub2 { font-family:var(--mono); font-size:11px; color:var(--gray); margin-top:3px; }
    .detail-hd .spacer { flex:1; }
    .btn { border:none; border-radius:9px; font-weight:700; font-size:12px; padding:10px 16px; letter-spacing:0.03em; }
    .btn-o { background:var(--orange); color:#fff; }
    .btn-o:hover { background:var(--orange-hl); }
    .btn-g { background:var(--card2); color:var(--gray); border:1px solid var(--border); }
    .btn-g:hover { color:var(--white); border-color:var(--gray); }
    .btn-grn { background:var(--green); color:#04120a; }

    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width:860px){ .grid2{grid-template-columns:1fr} .side{display:none} }
    .panel { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:16px; }
    .panel h3 { font-family:var(--mono); font-size:10px; letter-spacing:0.14em; color:var(--orange); margin-bottom:14px; }
    .qrow { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .qrow .ql { flex:1; font-size:13px; color:var(--gray); }
    .qrow .qb { width:110px; height:8px; background:var(--card2); border-radius:99px; overflow:hidden; }
    .qrow .qb i { display:block; height:100%; border-radius:99px; }
    .qrow .qn { font-family:var(--mono); font-size:11px; width:22px; text-align:right; }

    /* editor */
    .lvl-edit { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 18px; margin-bottom:14px; }
    .lvl-edit .lvl-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .lvl-edit .lvl-num { font-family:var(--head); font-size:20px; color:var(--orange); width:30px; }
    .lvl-edit input, .lvl-edit textarea { width:100%; background:var(--card2); border:1px solid var(--border);
      border-radius:8px; color:var(--white); font-family:var(--body); font-size:13px; padding:9px 11px; outline:none; }
    .lvl-edit input:focus, .lvl-edit textarea:focus { border-color:var(--orange); }
    .lvl-edit textarea { resize:vertical; min-height:44px; margin-top:8px; font-size:12px; color:var(--gray); }
    .m-edit { display:flex; gap:8px; align-items:center; margin-top:8px; }
    .m-edit .done-t { width:26px; height:26px; border-radius:7px; border:2px solid var(--muted); flex-shrink:0;
      display:flex; align-items:center; justify-content:center; cursor:pointer; color:transparent; font-size:13px; background:none; }
    .m-edit .done-t.y { background:var(--green); border-color:var(--green); color:#fff; }
    .m-edit select { background:var(--card2); border:1px solid var(--border); border-radius:8px; color:var(--gray);
      font-family:var(--mono); font-size:10px; padding:8px 6px; width:118px; flex-shrink:0; }
    .m-edit .del { background:none; border:none; color:var(--muted); font-size:16px; padding:2px 4px; }
    .m-edit .del:hover { color:var(--red); }
    .m-edit .win-t { background:none; border:none; font-size:15px; padding:2px 4px; opacity:0.22; filter:grayscale(1); }
    .m-edit .win-t:hover { opacity:0.7; filter:none; }
    .m-edit .win-t.set { opacity:1; filter:none; }
    .m-edit .win-t.derived { opacity:0.55; filter:none; }
    .mini-add { background:none; border:1px dashed var(--border); color:var(--muted); width:100%; border-radius:8px;
      padding:8px; font-family:var(--mono); font-size:10px; letter-spacing:0.1em; margin-top:10px; }
    .mini-add:hover { color:var(--orange); border-color:var(--orange); }
    .savebar { position:sticky; bottom:0; background:linear-gradient(transparent, var(--bg) 30%); padding:18px 0 6px; display:flex; gap:10px; }

    .toast { position:fixed; bottom:20px; right:20px; background:var(--card); border:1px solid var(--green); color:var(--green);
      font-family:var(--mono); font-size:12px; padding:11px 20px; border-radius:99px; transform:translateY(90px); transition:transform .3s; z-index:60; }
    .toast.show { transform:translateY(0); }

    /* ---- PIPELINE KANBAN ---- */
    .kb { display:flex; gap:12px; overflow-x:auto; padding-bottom:20px; align-items:flex-start; }
    .kb-col { flex:0 0 240px; background:var(--card2); border:1px solid var(--border); border-radius:12px; min-height:200px; }
    .kb-col.dragover { border-color:var(--orange); }
    .kb-col-hd { padding:12px 14px 8px; font-family:var(--mono); font-size:10px; letter-spacing:0.1em; color:var(--gray); display:flex; justify-content:space-between; }
    .kb-col-hd b { color:var(--orange); font-weight:500; }
    .kb-cards { padding:6px 8px 12px; display:flex; flex-direction:column; gap:8px; min-height:60px; }
    .kb-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:11px 12px; cursor:grab; }
    .kb-card:hover { border-color:var(--gray); }
    .kb-card .co { font-size:13px; font-weight:700; }
    .kb-card .who { font-size:11px; color:var(--gray); margin-top:1px; }
    .kb-card .meta { display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-family:var(--mono); font-size:10px; }
    .kb-card .val { color:var(--green); }
    .kb-card .age { color:var(--muted); }
    .kb-closed { display:flex; gap:10px; margin-top:6px; flex-wrap:wrap; }

    /* deal panel */
    .dp-wrap { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:70; display:none; }
    .dp { position:absolute; top:0; right:0; bottom:0; width:420px; max-width:92vw; background:var(--card); border-left:1px solid var(--border); overflow-y:auto; padding:20px; }
    .dp h2 { font-size:18px; }
    .dp .sub { font-family:var(--mono); font-size:11px; color:var(--gray); margin:3px 0 14px; }
    .dp label { display:block; font-family:var(--mono); font-size:9px; letter-spacing:0.1em; color:var(--muted); margin:12px 0 4px; }
    .dp select, .dp input, .dp textarea { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:8px;
      color:var(--white); font-family:var(--body); font-size:13px; padding:9px 11px; outline:none; }
    .dp .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .dp .links { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    .note-item { background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:9px 11px; font-size:12.5px; margin-bottom:7px; }
    .note-item .nt { font-family:var(--mono); font-size:9px; color:var(--muted); margin-top:4px; }
    .fu-item { display:flex; align-items:center; gap:8px; font-size:12px; padding:7px 0; border-bottom:1px solid var(--border); }
    .fu-item .st { font-family:var(--mono); font-size:9px; padding:2px 7px; border-radius:99px; }
    .fu-item .st.pending { background:var(--orange-dim); color:var(--orange); }
    .fu-item .st.sent { background:var(--green-dim); color:var(--green); }
    .fu-item .st.cancelled { background:var(--card2); color:var(--muted); }
  </style>
</head>
<body>

<!-- AUTH GATE -->
<div id="gate">
  <div class="gate-box">
    <h1>STRUCTTECH <span>/</span> OS</h1>
    <p>ADMIN PORTAL</p>
    <div class="empty">Loading…</div>
  </div>
</div>

<!-- APP -->
<div id="app">
<div class="shell">
  <div class="side">
    <div class="logo">STRUCTTECH <span>/</span> OS</div>
    <button class="nav-item" id="nav-pipeline" onclick="showView('pipeline')">📈 Pipeline</button>
    <button class="nav-item" id="nav-clients" onclick="showView('clients')">🤝 Clients</button>
    <button class="nav-item" id="nav-scans" onclick="showView('scans')">📥 Scans</button>
    <button class="nav-item soon">⚡ Automation <span class="tag">SOON</span></button>
    <button class="nav-item" style="margin-top:20px" onclick="logout()">🔒 Lock</button>
  </div>
  <div class="main" id="main"></div>
</div>
</div>

<div class="toast" id="toast">✓ SAVED</div>

<script>
/* ================= CONFIG ================= */
var SUPA_URL = 'https://ejlhrykcdfcyeooooodx.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbGhyeWtjZGZjeWVvb29vb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NjQ1NjUsImV4cCI6MjA4OTQ0MDU2NX0._bqBaeJtYNaykrzc5rTzuYzgsRYeX3ikzFVrpbv_kr4';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);
var ROADMAP_BASE = 'https://audit.structtek.com/roadmap.html';

var Q_LABELS = { q1:'Lead Response', q2:'Estimate Follow-Up', q3:'Field-to-Office', q4:'Job Cost Tracking',
  q5:'Tool Fragmentation', q6:'Key Person Risk', q7:'Invoice Speed', q8:'Crew Scheduling',
  q9:'Client Communication', q10:'Owner Dependency' };

var scans = [], roadmaps = [], deals = [], view = 'pipeline', editing = null, editorFrom = 'pipeline';

var STAGES = [
  { key:'new_scan',      label:'NEW SCAN' },
  { key:'contacted',     label:'CONTACTED' },
  { key:'call_booked',   label:'CALL BOOKED' },
  { key:'call_done',     label:'CALL DONE' },
  { key:'proposal_sent', label:'PROPOSAL SENT' },
  { key:'negotiating',   label:'NEGOTIATING' }
];

/* ================= AUTH ================= */
var params = new URLSearchParams(location.search);
var INVITE = params.get('invite');
var STAFF_TOKEN = null;

function gateBox(inner){ document.querySelector('#gate .gate-box').innerHTML =
  '<h1>STRUCTTECH <span>/</span> OS</h1><p>ADMIN PORTAL</p>' + inner; }

async function initAuth(){
  var s = await sb.auth.getSession();
  if (INVITE && !s.data.session) return renderStaffInvite();
  if (!s.data.session) return renderStaffLogin();
  if (INVITE) {
    try { await sb.rpc('accept_staff_invite', { p_token: INVITE, p_full_name: null }); history.replaceState({},'', location.pathname); }
    catch(e){}
  }
  var chk = await sb.from('staff_users').select('user_id').eq('user_id', s.data.session.user.id).maybeSingle();
  if (!chk.data) return renderNotStaff();
  STAFF_TOKEN = s.data.session.access_token;
  boot();
}
sb.auth.onAuthStateChange(function(event, session){ if (session) STAFF_TOKEN = session.access_token; });

function renderStaffLogin(msg){
  gateBox('<input type="email" id="a-email" placeholder="Email" autocomplete="email">' +
    '<input type="password" id="a-pw" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')doStaffLogin()">' +
    '<button onclick="doStaffLogin()">SIGN IN →</button><div class="gate-err">'+(msg||'')+'</div>');
}
async function doStaffLogin(){
  var r = await sb.auth.signInWithPassword({ email: document.getElementById('a-email').value.trim(), password: document.getElementById('a-pw').value });
  if (r.error) { renderStaffLogin(r.error.message); return; }
  initAuth();
}
function renderStaffInvite(){
  gateBox('<input type="text" id="a-name" placeholder="Your name" autocomplete="name">' +
    '<input type="email" id="a-email" placeholder="Email" autocomplete="email">' +
    '<input type="password" id="a-pw" placeholder="Create a password (8+ characters)" autocomplete="new-password">' +
    '<button onclick="doStaffSignup()">CREATE ACCOUNT →</button><div class="gate-err" id="a-err"></div>');
}
async function doStaffSignup(){
  var email = document.getElementById('a-email').value.trim();
  var pw = document.getElementById('a-pw').value;
  var name = document.getElementById('a-name').value.trim();
  var r = await sb.auth.signUp({ email: email, password: pw });
  if (r.error) { document.getElementById('a-err').textContent = r.error.message; return; }
  if (!r.data.session) { document.getElementById('a-err').textContent = 'Check your email to confirm your account, then return to this link.'; return; }
  try { await sb.rpc('accept_staff_invite', { p_token: INVITE, p_full_name: name }); }
  catch(e){ document.getElementById('a-err').textContent = 'Invite error: ' + e.message; return; }
  history.replaceState({},'', location.pathname);
  initAuth();
}
function renderNotStaff(){
  gateBox('<div class="empty">This account isn\'t authorized for admin access.<br>Contact another StructTech admin for an invite.</div>' +
    '<button class="btn btn-g" style="width:100%;margin-top:14px" onclick="logout()">SIGN OUT</button>');
}
function logout(){ sb.auth.signOut().then(function(){ location.reload(); }); }
initAuth();

/* ================= DATA ================= */
function H(){ return { 'apikey':SUPA_KEY, 'Authorization':'Bearer '+(STAFF_TOKEN||SUPA_KEY), 'Content-Type':'application/json' }; }
function boot(){
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  Promise.all([
    fetch(SUPA_URL + '/rest/v1/audit_leads?select=*&order=created_at.desc', { headers:H() }).then(function(r){ return r.json(); }),
    fetch(SUPA_URL + '/rest/v1/client_roadmaps?select=*&order=created_at.desc', { headers:H() }).then(function(r){ return r.json(); }),
    fetch(SUPA_URL + '/rest/v1/deals?select=*&order=created_at.desc', { headers:H() }).then(function(r){ return r.json(); })
  ]).then(function(res){ scans = res[0]||[]; roadmaps = res[1]||[]; deals = Array.isArray(res[2])?res[2]:[]; render(); });
}
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg||'✓ SAVED'; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1700); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function riskClass(r){ r=(r||'').toUpperCase(); if(r.indexOf('CRIT')>-1)return'crit'; if(r.indexOf('HIGH')>-1)return'high'; if(r.indexOf('MOD')>-1)return'mod'; return'low'; }
function fmtDate(d){ d=new Date(d); return (d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2); }
function rmStats(rm){ var t=0,d=0; (rm.levels||[]).forEach(function(l){ (l.milestones||[]).forEach(function(m){ t++; if(m.done)d++; }); }); return { t:t, d:d, pct: t?Math.round(d/t*100):0 }; }
function findRoadmapForLead(lead){ return roadmaps.find(function(r){ return r.lead_id===lead.id; }) ||
  roadmaps.find(function(r){ return r.client_name===lead.name && r.company===lead.company; }); }

/* ================= VIEWS ================= */
function showView(v){ view=v; editing=null; render(); }
function render(){
  ['scans','pipeline','clients'].forEach(function(v){ var el=document.getElementById('nav-'+v); if(el) el.classList.toggle('on', view===v); });
  if (view==='scans') renderScans();
  else if (view==='scan-detail') renderScanDetail();
  else if (view==='roadmaps') renderRoadmaps();
  else if (view==='rm-edit') renderEditor();
  else if (view==='pipeline') renderPipeline();
  else if (view==='clients') renderClients();
  else if (view==='client-detail') renderClientDetail();
}

/* ================= CLIENTS ================= */
var PORTAL_BASE = 'https://portal.structtek.com';
var orgs = [], currentOrg = null, orgData = {};

function renderClients(){
  document.getElementById('main').innerHTML = '<div class="page-title">CLIENTS</div><div class="page-sub">CLIENT BUSINESSES — PORTAL ACCESS, SYSTEMS, BILLING, REQUESTS</div><div class="empty">Loading…</div>';
  Promise.all([
    fetch(SUPA_URL + '/rest/v1/organizations?select=*&order=created_at.desc', { headers:H() }).then(function(r){ return r.json(); }),
    fetch(SUPA_URL + '/rest/v1/org_members?select=org_id', { headers:H() }).then(function(r){ return r.json(); }),
    fetch(SUPA_URL + '/rest/v1/tickets?select=org_id,status', { headers:H() }).then(function(r){ return r.json(); })
  ]).then(function(res){
    orgs = res[0]||[];
    var members = res[1]||[], tks = res[2]||[];
    var html = '<div class="page-title">CLIENTS</div><div class="page-sub">CLIENT BUSINESSES — PORTAL ACCESS, SYSTEMS, BILLING, REQUESTS</div>' +
      '<div class="panel"><h3>NEW CLIENT BUSINESS</h3><div style="display:flex;gap:8px;flex-wrap:wrap">' +
      '<input id="no-name" placeholder="Business name" style="flex:2;min-width:180px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:13px;padding:9px 11px;outline:none">' +
      '<input id="no-trade" placeholder="Trade" style="flex:1;min-width:110px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:13px;padding:9px 11px;outline:none">' +
      '<button class="btn btn-o" onclick="createOrg()">CREATE →</button></div></div>';
    if (!orgs.length) html += '<div class="empty">No client businesses yet. Create the first one above.</div>';
    else {
      html += '<table><tr><th>BUSINESS</th><th>TRADE</th><th>USERS</th><th>OPEN REQUESTS</th><th>CREATED</th></tr>';
      orgs.forEach(function(o){
        var mc = members.filter(function(m){ return m.org_id===o.id; }).length;
        var tc = tks.filter(function(t){ return t.org_id===o.id && ['open','in_progress'].indexOf(t.status)>-1; }).length;
        html += '<tr class="row" onclick="openOrg(\''+o.id+'\')"><td><b>'+esc(o.name)+'</b></td><td class="muted">'+esc(o.trade||'—')+'</td>' +
          '<td>'+mc+'</td><td>'+(tc?'<span class="pill high">'+tc+'</span>':'<span class="muted">0</span>')+'</td>' +
          '<td class="muted">'+fmtDate(o.created_at)+'</td></tr>';
      });
      html += '</table>';
    }
    document.getElementById('main').innerHTML = html;
  });
}

function createOrg(){
  var name = document.getElementById('no-name').value.trim();
  if (!name) return;
  fetch(SUPA_URL + '/rest/v1/organizations', { method:'POST', headers:Object.assign(H(),{'Prefer':'return=representation'}),
    body: JSON.stringify({ name:name, trade:document.getElementById('no-trade').value.trim()||null }) })
  .then(function(r){ return r.json(); })
  .then(function(rows){ toast('✓ CLIENT CREATED'); openOrg(rows[0].id); });
}

function openOrg(id){
  currentOrg = orgs.find(function(o){ return o.id===id; });
  view = 'client-detail';
  render();
}

      '<input id="bi-amount" type="number" placeholder="$" style="width:90px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:12px;padding:8px 10px;outline:none">' +

function createInvite(){
  var email = document.getElementById('inv-email').value.trim();
  if (!email || email.indexOf('@')<0) { toast('⚠ NEED VALID EMAIL'); return; }
  fetch(SUPA_URL + '/rest/v1/org_invites', { method:'POST', headers:Object.assign(H(),{'Prefer':'return=representation'}),
    body: JSON.stringify({ org_id: currentOrg.id, email: email, role: document.getElementById('inv-role').value }) })
  .then(function(r){ return r.json(); })
  .then(function(rows){
    var link = PORTAL_BASE + '/?invite=' + rows[0].token;
    navigator.clipboard.writeText(link);
    toast('✓ INVITE CREATED — LINK COPIED');
    renderClientDetail();
  });
}
function linkRoadmap(){
  var tok = prompt('Paste the roadmap token (from the roadmap URL after ?c=):');
  if (!tok) return;
  fetch(SUPA_URL + '/rest/v1/client_roadmaps?token=eq.'+tok.trim(), { method:'PATCH', headers:H(), body: JSON.stringify({ org_id: currentOrg.id }) })
  .then(function(r){ if(r.ok){ toast('✓ ROADMAP LINKED'); renderClientDetail(); } else toast('⚠ FAILED'); });
}
function addSystem(){
  var name = document.getElementById('sys-name').value.trim();
  if (!name) return;
  fetch(SUPA_URL + '/rest/v1/org_systems', { method:'POST', headers:H(), body: JSON.stringify({ org_id: currentOrg.id, name: name, status:'in_build' }) })
  .then(function(){ toast('✓ ADDED'); renderClientDetail(); });
}
function updSystem(id, body){ updRow('org_systems', id, body); }
function updRow(table, id, body){
  fetch(SUPA_URL + '/rest/v1/'+table+'?id=eq.'+id, { method:'PATCH', headers:H(), body: JSON.stringify(body) })
  .then(function(r){ toast(r.ok?'✓ SAVED':'⚠ FAILED'); });
}
function delRow(table, id){
  if (!confirm('Delete this item?')) return;
  fetch(SUPA_URL + '/rest/v1/'+table+'?id=eq.'+id, { method:'DELETE', headers:H() })
  .then(function(){ toast('DELETED'); renderClientDetail(); });
}
function addInvoice(){
  var label = document.getElementById('bi-label').value.trim();
  var amount = parseInt(document.getElementById('bi-amount').value);
  if (!label || !amount) return;
  fetch(SUPA_URL + '/rest/v1/org_invoices', { method:'POST', headers:H(),
    body: JSON.stringify({ org_id: currentOrg.id, label: label, amount: amount,
      kind: document.getElementById('bi-kind').value,
      due_date: document.getElementById('bi-due').value || null }) })
  .then(function(){ toast('✓ ADDED'); renderClientDetail(); });
}
function updTicket(id, status){
  fetch(SUPA_URL + '/rest/v1/tickets?id=eq.'+id, { method:'PATCH', headers:H(), body: JSON.stringify({ status: status, updated_at: new Date().toISOString() }) })
  .then(function(r){ toast(r.ok?'✓ STATUS SET':'⚠ FAILED'); });
}
function replyTicket(id){
  var el = document.getElementById('tr-'+id);
  var txt = el.value.trim();
  if (!txt) return;
  fetch(SUPA_URL + '/rest/v1/ticket_messages', { method:'POST', headers:H(),
    body: JSON.stringify({ ticket_id: id, author_name: 'Jacob — StructTech', is_structtech: true, content: txt }) })
  .then(function(r){ if(r.ok){ el.value=''; toast('✓ SENT'); } });
}

/* ================= SCHEDULE (engagement / buildout timeline) ================= */
var LVL_STATUS_LABEL = { not_started:'NOT STARTED', in_progress:'IN PROGRESS', blocked:'BLOCKED', complete:'COMPLETE' };
var LVL_STATUS_PILL = { not_started:'muted', in_progress:'blue', blocked:'crit', complete:'low' };
var CI_STATUS_OPTS = ['scheduled','done','missed','rescheduled'];

function renderSchedulePanel(o, orgDeal, d){
  var eng = d.engagement;
  if (!eng) {
    var canMaterialize = orgDeal && orgDeal.stage === 'closed_won';
    return '<div class="panel"><h3>SCHEDULE</h3>' +
      (canMaterialize
        ? '<button class="btn btn-o" onclick="materializeEngagement(\''+orgDeal.id+'\')">⚡ MATERIALIZE SCHEDULE FROM ROADMAP</button>' +
          '<div class="muted" style="font-size:11px;margin-top:8px">Builds levels + milestones from this client\'s roadmap so you can set target windows and log check-ins.</div>'
        : '<div class="muted" style="font-size:12px">No schedule yet — this appears once the deal behind this client is CLOSED WON (it materializes automatically, or use this button to backfill).</div>') +
      '</div>';
  }

  var levels = d.engLevels.filter(function(l){ return l.engagement_id === eng.id; });
  var milestones = d.engMilestones;
  var checkins = d.engCheckins.filter(function(c){ return c.engagement_id === eng.id; });

  var html = '<div class="panel"><h3>SCHEDULE — ENGAGEMENT</h3>';
  levels.forEach(function(lvl){
    var ms = milestones.filter(function(m){ return m.level_id === lvl.id; });
    html += '<div class="sch-lvl"><div class="sch-lvl-top">' +
      '<span class="pill '+(LVL_STATUS_PILL[lvl.status]||'muted')+'">L'+lvl.level_no+' · '+(LVL_STATUS_LABEL[lvl.status]||lvl.status)+'</span>' +
      '<b>'+esc(lvl.title)+'</b>' +
      '<select onchange="updRow(\'engagement_levels\',\''+lvl.id+'\',{status:this.value})" style="background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--gray);font-family:var(--mono);font-size:9px;padding:5px">' +
      ['not_started','in_progress','blocked','complete'].map(function(st){ return '<option value="'+st+'"'+(lvl.status===st?' selected':'')+'>'+LVL_STATUS_LABEL[st]+'</option>'; }).join('') +
      '</select></div>' +
      '<div class="sch-lvl-dates">' +
      '<label>WEEK OF (START)</label><input type="date" value="'+(lvl.planned_start||'')+'" onchange="updRow(\'engagement_levels\',\''+lvl.id+'\',{planned_start:this.value||null})" style="background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--gray);font-family:var(--mono);font-size:10px;padding:5px 7px">' +
      '<label>WEEK OF (END)</label><input type="date" value="'+(lvl.planned_end||'')+'" onchange="updRow(\'engagement_levels\',\''+lvl.id+'\',{planned_end:this.value||null})" style="background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--gray);font-family:var(--mono);font-size:10px;padding:5px 7px">' +
      '</div>';
    ms.forEach(function(m){
      html += '<div class="sch-ms"><button class="done-t '+(m.status==='complete'?'y':'')+'" onclick="toggleEngMilestone(\''+m.id+'\','+(m.status!=='complete')+')">✓</button>' +
        '<span style="flex:1'+(m.status==='complete'?';color:var(--muted);text-decoration:line-through':'')+'">'+esc(m.body)+(m.is_win_condition?' <span class="win">🏆 WIN CONDITION</span>':'')+'</span>' +
        '<span class="muted" style="font-family:var(--mono);font-size:9px">'+(m.owner==='client'?'CLIENT':'STRUCTTECH')+'</span></div>';
    });
    html += '</div>';
  });

  html += '<h3 style="margin-top:18px">CHECK-INS</h3>' +
    '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
    '<input id="ci-title" placeholder="Check-in title" style="flex:2;min-width:140px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:12px;padding:8px 10px;outline:none">' +
    '<input id="ci-when" type="datetime-local" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--gray);font-family:var(--mono);font-size:11px;padding:7px 9px;outline:none">' +
    '<select id="ci-level" style="background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--gray);font-family:var(--mono);font-size:10px;padding:5px">' +
    '<option value="">(no level)</option>' + levels.map(function(l){ return '<option value="'+l.id+'">L'+l.level_no+' — '+esc(l.title)+'</option>'; }).join('') + '</select>' +
    '<button class="btn btn-o" onclick="addCheckin(\''+eng.id+'\')">ADD</button></div><div style="margin-top:10px">';

      '<select onchange="updRow(\'engagement_checkins\',\''+c.id+'\',{status:this.value})" style="background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--gray);font-family:var(--mono);font-size:10px;padding:5px">' +
      CI_STATUS_OPTS.map(function(st){ return '<option value="'+st+'"'+(c.status===st?' selected':'')+'>'+st.toUpperCase()+'</option>'; }).join('') + '</select>' +

function materializeEngagement(dealId){

function toggleEngMilestone(id, done){

function addCheckin(engagementId){

/* ================= PIPELINE ================= */
function dealAge(d){ var days = Math.floor((Date.now() - new Date(d.updated_at||d.created_at)) / 86400000); return days === 0 ? 'today' : days + 'd'; }

function renderPipeline(){
  var open = deals.filter(function(d){ return d.stage !== 'closed_won' && d.stage !== 'closed_lost'; });
  var won  = deals.filter(function(d){ return d.stage === 'closed_won'; });
  var lost = deals.filter(function(d){ return d.stage === 'closed_lost'; });
  var pipeVal = open.reduce(function(a,d){ return a + (d.value||0); }, 0);
  var wonVal  = won.reduce(function(a,d){ return a + (d.value||0); }, 0);

  var html = '<div class="page-title">PIPELINE</div><div class="page-sub">STRUCTTECH SALES — SCAN TO SIGNED CLIENT</div>' +
    '<div class="stats">' +
    '<div class="stat"><div class="n">'+open.length+'</div><div class="l">OPEN DEALS</div></div>' +
    '<div class="stat"><div class="n">$'+pipeVal.toLocaleString()+'</div><div class="l">PIPELINE VALUE</div></div>' +
    '<div class="stat"><div class="n">'+won.length+'</div><div class="l">CLIENTS WON</div></div>' +
    '<div class="stat"><div class="n">$'+wonVal.toLocaleString()+'</div><div class="l">WON VALUE</div></div></div>';

  html += '<div class="kb">';
  STAGES.forEach(function(s){
    var cards = open.filter(function(d){ return d.stage === s.key; });
    html += '<div class="kb-col" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="dropDeal(event,\''+s.key+'\',this)">' +
      '<div class="kb-col-hd"><span>'+s.label+'</span><b>'+cards.length+'</b></div><div class="kb-cards">';
    cards.forEach(function(d){
      html += '<div class="kb-card" draggable="true" ondragstart="event.dataTransfer.setData(\'text\',\''+d.id+'\')" onclick="openDeal(\''+d.id+'\')">' +
        '<div class="co">'+esc(d.company||d.contact_name)+'</div>' +
        '<div class="who">'+esc(d.contact_name)+(d.trade?' · '+esc(d.trade):'')+'</div>' +
        '<div class="meta"><span class="val">'+(d.value?'$'+d.value.toLocaleString():'—')+'</span><span class="age">'+dealAge(d)+'</span></div></div>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  html += '<div class="kb-closed">' +
    won.map(function(d){ return '<span class="pill low" style="cursor:pointer" onclick="openDeal(\''+d.id+'\')">✓ '+esc(d.company||d.contact_name)+'</span>'; }).join('') +
    lost.map(function(d){ return '<span class="pill crit" style="cursor:pointer" onclick="openDeal(\''+d.id+'\')">✕ '+esc(d.company||d.contact_name)+'</span>'; }).join('') +
    '</div>';

  html += '<div class="dp-wrap" id="dpWrap" onclick="if(event.target===this)closeDeal()"><div class="dp" id="dpBody"></div></div>';
  document.getElementById('main').innerHTML = html;
}

function dropDeal(ev, stage, col){
  col.classList.remove('dragover');
  var id = ev.dataTransfer.getData('text');
  var d = deals.find(function(x){ return x.id === id; });
  if (!d || d.stage === stage) return;
  setStage(d, stage);
}

function setStage(d, stage, lostReason){
  var body = { stage: stage };
  if (lostReason) body.lost_reason = lostReason;
  fetch(SUPA_URL + '/rest/v1/deals?id=eq.'+d.id, { method:'PATCH', headers:H(), body: JSON.stringify(body) })
    .then(function(r){
      if (!r.ok) { toast('⚠ FAILED'); return; }
      d.stage = stage; if (lostReason) d.lost_reason = lostReason;
      d.updated_at = new Date().toISOString();
      toast('✓ ' + stage.replace(/_/g,' ').toUpperCase());
      renderPipeline();
    });
}

var openDealId = null;
function openDeal(id){
  openDealId = id;
  var d = deals.find(function(x){ return x.id === id; });
  var lead = d.lead_id ? scans.find(function(s){ return s.id === d.lead_id; }) : null;
  var rm = d.lead_id ? roadmaps.find(function(r){ return r.lead_id === d.lead_id && r.status !== 'archived'; }) : null;

  var html = '<h2>'+esc(d.company||d.contact_name)+'</h2>' +
    '<div class="sub">'+esc(d.contact_name)+(d.trade?' · '+esc(d.trade):'')+(d.crew_size?' · '+d.crew_size+' crew':'')+'</div>' +
    (d.email?'<div style="font-size:12px;color:var(--gray)">'+esc(d.email)+'</div>':'') +
    '<div class="row2"><div><label>STAGE</label><select onchange="panelStage(this.value)">' +
    STAGES.map(function(s){ return '<option value="'+s.key+'"'+(d.stage===s.key?' selected':'')+'>'+s.label+'</option>'; }).join('') +
    '<option value="closed_won"'+(d.stage==='closed_won'?' selected':'')+'>✓ CLOSED WON</option>' +
    '<option value="closed_lost"'+(d.stage==='closed_lost'?' selected':'')+'>✕ CLOSED LOST</option></select></div>' +
    '<div><label>DEAL VALUE ($)</label><input type="number" value="'+(d.value||'')+'" onchange="panelValue(this.value)"></div></div>';

  if (d.stage === 'closed_lost' && d.lost_reason) html += '<label>LOST REASON</label><div style="font-size:12px;color:var(--gray)">'+esc(d.lost_reason)+'</div>';

  html += '<div class="links">' +
    (lead ? '<button class="btn btn-g" onclick="closeDeal();openScan(\''+lead.id+'\')">VIEW SCAN</button>' : '') +
    (rm ? '<button class="btn btn-g" onclick="closeDeal();openEditor(\''+rm.id+'\')">VIEW ROADMAP</button>' : '') +
    '</div>' +
    '<label>CLIENT PORTAL</label><div id="dpPortal" class="muted" style="font-size:12px">Checking…</div>';

  html += '<label>FOLLOW-UP SEQUENCE</label><div id="dpFu" class="muted" style="font-size:12px">Loading…</div>';
  html += '<label>ADD NOTE</label><textarea id="dpNote" rows="2" placeholder="What happened?"></textarea>' +
    '<button class="btn btn-o" style="margin-top:8px;width:100%" onclick="addDealNote()">SAVE NOTE</button>' +
    '<label>NOTES</label><div id="dpNotes" class="muted" style="font-size:12px">Loading…</div>';

  document.getElementById('dpBody').innerHTML = html;
  document.getElementById('dpWrap').style.display = 'block';

  // portal status for this deal
  fetch(SUPA_URL + '/rest/v1/organizations?deal_id=eq.'+id+'&select=id,name', { headers:H() })
    .then(function(r){ return r.json(); }).then(function(os){
      var el = document.getElementById('dpPortal'); if (!el) return;
      if (os.length) {
        el.innerHTML = '<span class="pill low">PORTAL ACTIVE</span> <button class="btn btn-g" onclick="closeDeal();jumpToOrg(\''+os[0].id+'\')">MANAGE CLIENT →</button>';
      } else {
        el.innerHTML = '<button class="btn btn-o" onclick="createPortalFromDeal()">⚡ CREATE CLIENT PORTAL</button>' +
          '<div class="muted" style="font-size:11px;margin-top:6px">Creates the business, links their roadmap, and copies an owner invite link for ' + esc(d.email||'their email') + '.</div>';
      }
    });

  fetch(SUPA_URL + '/rest/v1/follow_ups?deal_id=eq.'+id+'&order=send_at.asc', { headers:H() })
    .then(function(r){ return r.json(); }).then(function(fus){
      var el = document.getElementById('dpFu'); if (!el) return;
      if (!fus.length) { el.textContent = 'None scheduled.'; return; }
      el.innerHTML = fus.map(function(f){
        var dte = new Date(f.send_at);
        return '<div class="fu-item"><span class="st '+f.status+'">'+f.status.toUpperCase()+'</span>' +
          '<span style="flex:1">'+esc(f.subject)+'</span>' +
          '<span class="muted" style="font-family:var(--mono);font-size:10px">'+(dte.getMonth()+1)+'/'+dte.getDate()+'</span>' +
          (f.status==='pending' ? '<button class="del" onclick="cancelFu(\''+f.id+'\')">✕</button>' : '') + '</div>';
      }).join('');
    });

  fetch(SUPA_URL + '/rest/v1/deal_notes?deal_id=eq.'+id+'&order=created_at.desc', { headers:H() })
    .then(function(r){ return r.json(); }).then(function(ns){
      var el = document.getElementById('dpNotes'); if (!el) return;
      el.innerHTML = ns.length ? ns.map(function(n){
        var dte = new Date(n.created_at);
        return '<div class="note-item">'+esc(n.content)+'<div class="nt">'+(dte.getMonth()+1)+'/'+dte.getDate()+' '+String(dte.getHours()).padStart(2,'0')+':'+String(dte.getMinutes()).padStart(2,'0')+'</div></div>';
      }).join('') : 'No notes yet.';
    });
}
function closeDeal(){ var w=document.getElementById('dpWrap'); if(w) w.style.display='none'; openDealId=null; }
function panelStage(stage){
  var d = deals.find(function(x){ return x.id === openDealId; });
  if (stage === 'closed_lost') {
    var reason = prompt('Why was this lost? (required)');
    if (!reason) { openDeal(d.id); return; }
    setStage(d, stage, reason);
  } else setStage(d, stage);
  openDeal(d.id);
}
function panelValue(v){
  var d = deals.find(function(x){ return x.id === openDealId; });
  var val = parseInt(v) || null;
  fetch(SUPA_URL + '/rest/v1/deals?id=eq.'+d.id, { method:'PATCH', headers:H(), body: JSON.stringify({ value: val }) })
    .then(function(r){ if (r.ok) { d.value = val; toast('✓ VALUE SET'); } });
}
function addDealNote(){
  var txt = document.getElementById('dpNote').value.trim();
  if (!txt) return;
  fetch(SUPA_URL + '/rest/v1/deal_notes', { method:'POST', headers:H(), body: JSON.stringify({ deal_id: openDealId, content: txt }) })
    .then(function(r){ if (r.ok) { toast('✓ NOTE SAVED'); openDeal(openDealId); } });
}
function cancelFu(id){
  fetch(SUPA_URL + '/rest/v1/follow_ups?id=eq.'+id, { method:'PATCH', headers:H(), body: JSON.stringify({ status:'cancelled' }) })
    .then(function(r){ if (r.ok) { toast('CANCELLED'); openDeal(openDealId); } });
}
function jumpToOrg(orgId){
  fetch(SUPA_URL + '/rest/v1/organizations?select=*&order=created_at.desc', { headers:H() })
    .then(function(r){ return r.json(); })
    .then(function(os){ orgs = os||[]; openOrg(orgId); });
}
function createPortalFromDeal(){
  var d = deals.find(function(x){ return x.id === openDealId; });
  if (!d.email || d.email.indexOf('@') < 0) { toast('⚠ DEAL HAS NO VALID EMAIL'); return; }
  var orgId = null;
  // 1. create the business (linked to this deal)
  fetch(SUPA_URL + '/rest/v1/organizations', { method:'POST', headers:Object.assign(H(),{'Prefer':'return=representation'}),
    body: JSON.stringify({ name: d.company || d.contact_name, trade: d.trade, deal_id: d.id }) })
  .then(function(r){ return r.json(); })
  .then(function(rows){
    orgId = rows[0].id;
    // 2. link their roadmap (via the scan behind this deal)
    var linkRm = d.lead_id
      ? fetch(SUPA_URL + '/rest/v1/client_roadmaps?lead_id=eq.'+d.lead_id+'&status=eq.active', { method:'PATCH', headers:H(), body: JSON.stringify({ org_id: orgId }) })
      : Promise.resolve();
    // 3. create the owner invite
    var inv = fetch(SUPA_URL + '/rest/v1/org_invites', { method:'POST', headers:Object.assign(H(),{'Prefer':'return=representation'}),
      body: JSON.stringify({ org_id: orgId, email: d.email, role: 'owner' }) }).then(function(r){ return r.json(); });
    return Promise.all([linkRm, inv]);
  })
  .then(function(res){
    var invite = res[1][0];
    var link = PORTAL_BASE + '/?invite=' + invite.token;
    navigator.clipboard.writeText(link);
    toast('✓ PORTAL CREATED — INVITE LINK COPIED');
    openDeal(openDealId);
  })
  .catch(function(){ toast('⚠ PORTAL CREATE FAILED'); });
}

    return (s.name||'').toLowerCase().indexOf(q)>-1 || (s.company||'').toLowerCase().indexOf(q)>-1 || (s.trade||'').toLowerCase().indexOf(q)>-1;
  });
  var avg = scans.length ? Math.round(scans.reduce(function(a,s){return a+(s.score||0);},0)/scans.length) : 0;
  var leak = scans.reduce(function(a,s){return a+(s.monthly_leak||0);},0);
  var html = '<div class="page-title">SCANS</div><div class="page-sub">EVERY REVENUE LEAK SCAN SUBMITTED</div>' +
    '<div class="stats">' +
    '<div class="stat"><div class="n">'+scans.length+'</div><div class="l">TOTAL SCANS</div></div>' +
    '<div class="stat"><div class="n">'+avg+'</div><div class="l">AVG SCORE</div></div>' +
    '<div class="stat"><div class="n">$'+leak.toLocaleString()+'</div><div class="l">TOTAL LEAK IDENTIFIED /MO</div></div>' +
    '<div class="stat"><div class="n">'+roadmaps.length+'</div><div class="l">ROADMAPS</div></div></div>' +
    '<div class="toolbar"><input placeholder="Search name, company, trade…" oninput="renderScans(this.value)" value="'+esc(filter||'')+'"></div>';

  else {
    html += '<table><tr><th>DATE</th><th>NAME</th><th>COMPANY</th><th>TRADE</th><th>SCORE</th><th>RISK</th><th>LEAK/MO</th><th>ROADMAP</th></tr>';
    rows.forEach(function(s, i){
      var rm = findRoadmapForLead(s);
      html += '<tr class="row" onclick="openScan(\''+s.id+'\')">' +
        '<td class="muted">'+fmtDate(s.created_at)+'</td>' +
        '<td><b>'+esc(s.name||'—')+'</b></td><td>'+esc(s.company||'—')+'</td>' +
        '<td class="muted">'+esc(s.trade||'—')+'</td>' +
        '<td class="score-chip">'+(s.score!=null?s.score+'/100':'—')+'</td>' +
        '<td><span class="pill '+riskClass(s.risk_level)+'">'+esc(s.risk_level||'—')+'</span></td>' +
        '<td style="color:#f87171;font-weight:600">'+(s.monthly_leak?'$'+s.monthly_leak.toLocaleString():'—')+'</td>' +
        '<td>'+(rm?'<span class="pill blue">'+rmStats(rm).pct+'%</span>':'<span class="muted">—</span>')+'</td></tr>';
    });
    html += '</table>';
  }
  document.getElementById('main').innerHTML = html;
}

function backFromEditor(){ editing=null; view = editorFrom || 'pipeline'; render(); }
function renderEditor(){

  var html = '<button class="back" onclick="backFromEditor()">← BACK</button>' +
    '<div class="detail-hd"><div class="who"><h2>'+esc(r.client_name)+' — '+esc(r.company)+'</h2>' +
    '<div class="sub2">'+st.d+'/'+st.t+' milestones · '+st.pct+'% · '+esc(r.trade||'')+'</div></div><div class="spacer"></div>' +
    '<button class="btn btn-g" onclick="copyText(\''+clientUrl+'\',this)">COPY CLIENT LINK</button>' +
    '<button class="btn btn-g" onclick="exportPDF()">⬇ PDF</button>' +
    '<button class="btn btn-g" onclick="exportPPTX()">⬇ PPTX</button>' +
    (r.lead_id ? '<button class="btn btn-g" onclick="regenRoadmap()">↺ REGENERATE</button>' : '') +
    '<button class="btn btn-g" onclick="toggleHistory()">🕘 HISTORY</button>' +
    '</div>' +
    '<div id="histPanel" style="display:none" class="panel"><h3>EDIT HISTORY — SNAPSHOTS SAVED BEFORE EACH CHANGE</h3><div id="histList"></div></div>';

  (r.levels||[]).forEach(function(lvl, li){
    html += '<div class="lvl-edit">' +
      '<div class="lvl-top"><div class="lvl-num">L'+(li+1)+'</div>' +
      '<input value="'+esc(lvl.title)+'" oninput="editing.levels['+li+'].title=this.value">' +
      (li>0?'<button class="btn btn-g" onclick="moveLvl('+li+',-1)">↑</button>':'') +
      (li<r.levels.length-1?'<button class="btn btn-g" onclick="moveLvl('+li+',1)">↓</button>':'') +
      '<button class="btn btn-g" style="color:var(--red)" onclick="delLvl('+li+')">✕</button></div>' +
      '<textarea oninput="editing.levels['+li+'].why=this.value" placeholder="Why this matters…">'+esc(lvl.why||'')+'</textarea>';
    var wIdx = editorWinIndex(lvl);
    (lvl.milestones||[]).forEach(function(m, mi){
      var winCls = m.win ? 'set' : (mi === wIdx ? 'derived' : '');
      html += '<div class="m-edit">' +
        '<button class="done-t '+(m.done?'y':'')+'" onclick="tgl('+li+','+mi+',this)">✓</button>' +
        '<input value="'+esc(m.label)+'" oninput="editing.levels['+li+'].milestones['+mi+'].label=this.value">' +
        '<select onchange="editing.levels['+li+'].milestones['+mi+'].owner=this.value">' +
        '<option value="jacob"'+(m.owner!=='client'?' selected':'')+'>STRUCTTECH</option>' +
        '<option value="client"'+(m.owner==='client'?' selected':'')+'>CLIENT</option></select>' +
        '<button class="win-t '+winCls+'" title="'+(m.win?'WIN CONDITION (click to unset)':(mi===wIdx?'Current win condition (auto) — click to lock it':'Set as WIN CONDITION'))+'" onclick="setWin('+li+','+mi+')">🏆</button>' +
        '<button class="del" onclick="delMile('+li+','+mi+')">✕</button></div>';
    });
    html += '<button class="mini-add" onclick="addMile('+li+')">+ MILESTONE</button></div>';
  });

  html += '<button class="mini-add" style="padding:12px" onclick="addLvl()">+ ADD LEVEL</button>' +
    '<div class="savebar"><button class="btn btn-o" style="flex:1;padding:14px" onclick="saveRoadmap()">SAVE CHANGES</button>' +
    '<button class="btn btn-g" onclick="archiveRoadmap()">ARCHIVE</button></div>';
  document.getElementById('main').innerHTML = html;
}
function tgl(li,mi,el){ var m=editing.levels[li].milestones[mi]; m.done=!m.done; m.done_at=m.done?new Date().toISOString():null; el.classList.toggle('y',m.done); }
/* WIN CONDITION: same rule the client page uses — explicit flag, else last client-owned milestone */
function editorWinIndex(lvl){
  for (var i=0;i<lvl.milestones.length;i++) if (lvl.milestones[i].win) return i;
  for (var i=lvl.milestones.length-1;i>=0;i--) if (lvl.milestones[i].owner==='client') return i;
  return -1;
}
function setWin(li,mi){
  var ms = editing.levels[li].milestones;
  var was = ms[mi].win;
  ms.forEach(function(m){ delete m.win; });
  if (!was) ms[mi].win = true;   // toggle: clicking the set one reverts to auto
  render();
}
function delMile(li,mi){ editing.levels[li].milestones.splice(mi,1); render(); }
function addMile(li){ editing.levels[li].milestones.push({ id:'l'+li+'m'+Date.now(), label:'', owner:'jacob', done:false, done_at:null }); render(); }
function delLvl(li){ if(confirm('Delete this level?')){ editing.levels.splice(li,1); render(); } }
function addLvl(){ editing.levels.push({ title:'', why:'', milestones:[{ id:'m'+Date.now(), label:'', owner:'jacob', done:false, done_at:null }] }); render(); }
function moveLvl(li,dir){ var l=editing.levels.splice(li,1)[0]; editing.levels.splice(li+dir,0,l); render(); }
function saveRoadmap(){
  // snapshot current DB state into history before overwriting (keep 15)
  var current = roadmaps.find(function(r){return r.id===editing.id;});
  var hist = (current && current.history) ? current.history.slice(0,14) : [];
  hist.unshift({ ts: new Date().toISOString(), levels: current ? current.levels : editing.levels });
  fetch(SUPA_URL + '/rest/v1/client_roadmaps?id=eq.'+editing.id, { method:'PATCH', headers:H(),
    body: JSON.stringify({ levels: editing.levels, status: editing.status||'active', history: hist }) })
  .then(function(res){
    if(!res.ok) { toast('⚠ SAVE FAILED'); return; }
    var idx = roadmaps.findIndex(function(r){return r.id===editing.id;});
    if(idx>-1){ roadmaps[idx].levels = JSON.parse(JSON.stringify(editing.levels)); roadmaps[idx].history = hist; editing.history = hist; }
    toast('✓ SAVED');
  });
}

/* ---- HISTORY ---- */
function toggleHistory(){
  var p = document.getElementById('histPanel');
  if (p.style.display === 'none') { p.style.display = 'block'; renderHistory(); }
  else p.style.display = 'none';
}
function renderHistory(){
  var hist = editing.history || [];
  var el = document.getElementById('histList');
  if (!hist.length) { el.innerHTML = '<div class="muted" style="font-size:13px">No snapshots yet — one is saved automatically every time you hit SAVE CHANGES.</div>'; return; }
  el.innerHTML = hist.map(function(h, i){
    var d = new Date(h.ts);
    var when = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    var nLvl = (h.levels||[]).length, nMs = 0, nDone = 0;
    (h.levels||[]).forEach(function(l){ (l.milestones||[]).forEach(function(m){ nMs++; if(m.done) nDone++; }); });
    return '<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px">' +
      '<span class="muted" style="font-family:var(--mono);font-size:11px;width:88px">'+when+'</span>' +
      '<span style="flex:1;color:var(--gray)">'+nLvl+' levels · '+nDone+'/'+nMs+' done</span>' +
      '<button class="btn btn-g" onclick="restoreSnap('+i+')">RESTORE</button></div>';
  }).join('');
}
function restoreSnap(i){
  if(!confirm('Restore this snapshot? Your current unsaved edits are replaced (the current DB state gets snapshotted too, so nothing is lost).')) return;
  editing.levels = JSON.parse(JSON.stringify(editing.history[i].levels));
  render();
  saveRoadmap();
}

/* ---- REGENERATE ---- */
function regenRoadmap(){
  if(!confirm('Regenerate this roadmap fresh from the scan data using the playbook?\n\nThe current version is ARCHIVED (not deleted) and a new roadmap with a NEW client link is created.')) return;
  fetch(SUPA_URL + '/rest/v1/client_roadmaps?id=eq.'+editing.id, { method:'PATCH', headers:H(), body: JSON.stringify({ status:'archived' }) })
  .then(function(){ return fetch(SUPA_URL + '/rest/v1/rpc/generate_roadmap_for_lead', { method:'POST', headers:H(), body: JSON.stringify({ p_lead_id: editing.lead_id }) }); })
  .then(function(r){ return r.json(); })
  .then(function(newToken){
    return fetch(SUPA_URL + '/rest/v1/client_roadmaps?select=*&order=created_at.desc', { headers:H() })
      .then(function(r){ return r.json(); })
      .then(function(rm){
        roadmaps = rm || [];
        var fresh = roadmaps.find(function(x){ return x.token === newToken; });
        toast('✓ REGENERATED');
        if (fresh) openEditor(fresh.id); else showView('roadmaps');
      });
  })
  .catch(function(){ toast('⚠ REGEN FAILED'); });
}
function archiveRoadmap(){
  if(!confirm('Archive this roadmap? It disappears from the list (data kept).')) return;
  fetch(SUPA_URL + '/rest/v1/client_roadmaps?id=eq.'+editing.id, { method:'PATCH', headers:H(), body: JSON.stringify({ status:'archived' }) })
  .then(function(){ var idx=roadmaps.findIndex(function(r){return r.id===editing.id;}); if(idx>-1) roadmaps[idx].status='archived'; backFromEditor(); toast('ARCHIVED'); });
}
function copyText(t, el){ navigator.clipboard.writeText(t); var o=el.textContent; el.textContent='✓ COPIED'; setTimeout(function(){el.textContent=o;},1400); }

/* ---- EXPORT: PDF (print window) ---- */
function exportPDF(){
  var r = editing; var st = rmStats(r);
  var w = window.open('', '_blank');
  var lvHtml = '';
  (r.levels||[]).forEach(function(lvl, i){
    var s = { t:lvl.milestones.length, d:lvl.milestones.filter(function(m){return m.done;}).length };
    lvHtml += '<div class="lv"><div class="lv-hd"><div class="badge">'+(i+1)+'</div><div><div class="lv-tag">LEVEL '+(i+1)+'</div>' +
      '<div class="lv-title">'+esc(lvl.title)+'</div></div><div class="lv-pct">'+s.d+'/'+s.t+'</div></div>' +
      (lvl.why?'<div class="why">'+esc(lvl.why)+'</div>':'') + '<div class="miles">';
    lvl.milestones.forEach(function(m){
      lvHtml += '<div class="mi"><div class="bx'+(m.done?' y':'')+'">'+(m.done?'✓':'')+'</div><div class="ml">'+esc(m.label)+
        ' <span class="ow '+(m.owner==='client'?'c':'j')+'">'+(m.owner==='client'?'YOUR MOVE':'STRUCTTECH')+'</span></div></div>';
    });
    lvHtml += '</div></div>';
  });
  w.document.write('<!DOCTYPE html><html><head><title>'+esc(r.company)+' — StructTech Roadmap</title><style>' +
    'body{font-family:Arial,Helvetica,sans-serif;color:#0f172a;margin:0;padding:36px;max-width:720px;margin:0 auto}' +
    '.hd{background:#0f172a;color:#fff;border-radius:14px;padding:24px 28px;margin-bottom:8px}' +
    '.hd .mono{font-family:monospace;font-size:10px;color:#f97316;letter-spacing:2px;margin-bottom:6px}' +
    '.hd h1{margin:0;font-size:26px}.hd .meta{font-size:12px;color:#94a3b8;margin-top:6px}' +
    '.scorebar{display:flex;gap:26px;align-items:center;background:#0f172a;color:#fff;border-radius:14px;padding:18px 28px;margin-bottom:22px}' +
    '.circle{width:74px;height:74px;border-radius:50%;border:5px solid #f97316;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;font-size:22px}' +
    '.circle small{font-size:9px;color:#94a3b8;font-weight:normal}' +
    '.sb-item .l{font-size:10px;color:#94a3b8;font-family:monospace}.sb-item .v{font-size:18px;font-weight:bold;color:#f97316}.sb-item .v.red{color:#ef4444}' +
    '.lv{border:1.5px solid #e2e8f0;border-radius:14px;padding:16px 20px;margin-bottom:14px;page-break-inside:avoid}' +
    '.lv-hd{display:flex;align-items:center;gap:14px}.badge{width:40px;height:40px;border-radius:10px;background:#fff7ed;border:2px solid #f97316;color:#f97316;font-weight:bold;font-size:18px;display:flex;align-items:center;justify-content:center}' +
    '.lv-tag{font-family:monospace;font-size:9px;color:#f97316;letter-spacing:1.5px}.lv-title{font-size:17px;font-weight:bold}' +
    '.lv-pct{margin-left:auto;font-family:monospace;font-size:13px;color:#64748b}' +
    '.why{font-size:12px;color:#475569;margin:10px 0 4px;line-height:1.6}' +
    '.miles{margin-top:10px}.mi{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-top:1px solid #f1f5f9}' +
    '.bx{width:20px;height:20px;border-radius:6px;border:2px solid #cbd5e1;flex-shrink:0;text-align:center;font-size:12px;line-height:18px;color:#fff}' +
    '.bx.y{background:#22c55e;border-color:#22c55e}' +
    '.ml{font-size:13px;line-height:1.5}.ow{font-family:monospace;font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:99px;margin-left:6px}' +
    '.ow.j{background:#fff7ed;color:#ea580c}.ow.c{background:#eff6ff;color:#2563eb}' +
    '.foot{text-align:center;font-size:11px;color:#94a3b8;margin-top:26px}' +
    '@media print{body{padding:0}}</style></head><body>' +
    '<div class="hd"><div class="mono">STRUCTTECH / EXECUTION ROADMAP</div><h1>'+esc(r.client_name)+' — '+esc(r.company)+'</h1>' +
    '<div class="meta">'+esc(r.trade||'')+' · '+(r.crew_size||'?')+' crew</div></div>' +
    '<div class="scorebar"><div class="circle">'+(r.score!=null?r.score:'—')+'<small>/100</small></div>' +
    '<div class="sb-item"><div class="l">RISK LEVEL</div><div class="v">'+esc(r.risk_level||'—')+'</div></div>' +
    '<div class="sb-item"><div class="l">EST. MONTHLY LEAK</div><div class="v red">$'+(r.revenue_leak_monthly||0).toLocaleString()+'</div></div>' +
    '<div class="sb-item"><div class="l">PROGRESS</div><div class="v">'+st.pct+'%</div></div></div>' +
    lvHtml +
    '<div class="foot">Jacob Walker · StructTech LLC · 937.467.2660 · structtek.com</div>' +
    '<script>window.onload=function(){window.print()}<\/script></body></html>');
  w.document.close();
}

/* ---- EXPORT: PPTX ---- */
function exportPPTX(){
  var r = editing; var st = rmStats(r);
  var p = new PptxGenJS();
  p.defineLayout({ name:'W', width:13.33, height:7.5 }); p.layout = 'W';
  var DARK='0F172A', ORANGE='F97316', GRAY='94A3B8', WHITE='F8FAFC', GREEN='22C55E', RED='EF4444', BLUE='3B82F6';

  // Title slide
  var s1 = p.addSlide(); s1.background = { color: DARK };
  s1.addText('STRUCTTECH / EXECUTION ROADMAP', { x:0.6, y:0.5, w:12, h:0.4, fontFace:'Courier New', fontSize:12, color:ORANGE, charSpacing:4 });
  s1.addText(r.client_name + ' — ' + r.company, { x:0.6, y:1.2, w:12, h:1.0, fontFace:'Arial', fontSize:40, bold:true, color:WHITE });
  s1.addText((r.trade||'') + '  ·  ' + (r.crew_size||'?') + ' crew', { x:0.6, y:2.2, w:12, h:0.4, fontFace:'Courier New', fontSize:13, color:GRAY });
  s1.addShape(p.ShapeType.ellipse, { x:0.9, y:3.4, w:2.4, h:2.4, line:{ color:ORANGE, width:5 }, fill:{ color:'1E293B' } });
  s1.addText([{ text:(r.score!=null?String(r.score):'—'), options:{ fontSize:40, bold:true, color:WHITE } },
              { text:'\n/100', options:{ fontSize:12, color:GRAY } }],
             { x:0.9, y:3.4, w:2.4, h:2.4, align:'center', valign:'middle', fontFace:'Arial' });
  s1.addText('RISK LEVEL', { x:4.2, y:3.6, w:3, h:0.3, fontFace:'Courier New', fontSize:11, color:GRAY });
  s1.addText(r.risk_level||'—', { x:4.2, y:3.95, w:3.4, h:0.55, fontFace:'Arial', fontSize:26, bold:true, color:ORANGE });
  s1.addText('EST. MONTHLY LEAK', { x:4.2, y:4.75, w:3.4, h:0.3, fontFace:'Courier New', fontSize:11, color:GRAY });
  s1.addText('$' + (r.revenue_leak_monthly||0).toLocaleString(), { x:4.2, y:5.1, w:3.4, h:0.6, fontFace:'Arial', fontSize:30, bold:true, color:RED });
  s1.addText('MISSION PROGRESS', { x:8.4, y:3.6, w:4, h:0.3, fontFace:'Courier New', fontSize:11, color:GRAY });
  s1.addShape(p.ShapeType.roundRect, { x:8.4, y:4.05, w:4.0, h:0.42, rectRadius:0.2, fill:{ color:'1E293B' } });
  if (st.pct > 0) s1.addShape(p.ShapeType.roundRect, { x:8.4, y:4.05, w:Math.max(0.45, 4.0*st.pct/100), h:0.42, rectRadius:0.2, fill:{ color:ORANGE } });
  s1.addText(st.pct + '% — ' + st.d + ' of ' + st.t + ' milestones', { x:8.4, y:4.6, w:4, h:0.35, fontFace:'Arial', fontSize:12, color:GRAY });

  // One slide per level
  (r.levels||[]).forEach(function(lvl, i){
    var s = p.addSlide(); s.background = { color: DARK };
    var done = lvl.milestones.filter(function(m){return m.done;}).length;
    s.addText('LEVEL ' + (i+1) + ' OF ' + r.levels.length, { x:0.6, y:0.45, w:6, h:0.35, fontFace:'Courier New', fontSize:12, color:ORANGE, charSpacing:3 });
    s.addText(lvl.title, { x:0.6, y:0.9, w:11, h:0.8, fontFace:'Arial', fontSize:32, bold:true, color:WHITE });
    if (lvl.why) s.addText(lvl.why, { x:0.6, y:1.75, w:11.5, h:0.7, fontFace:'Arial', fontSize:14, italic:true, color:GRAY });
    var y = 2.7;
    lvl.milestones.forEach(function(m){
      s.addShape(p.ShapeType.roundRect, { x:0.6, y:y, w:12.1, h:0.62, rectRadius:0.08, fill:{ color:'111827' }, line:{ color: m.done ? GREEN : '1E293B', width:1 } });
      s.addShape(p.ShapeType.roundRect, { x:0.78, y:y+0.14, w:0.34, h:0.34, rectRadius:0.06, fill:{ color: m.done ? GREEN : '0F172A' }, line:{ color: m.done ? GREEN : GRAY, width:1.5 } });
      if (m.done) s.addText('✓', { x:0.78, y:y+0.12, w:0.34, h:0.34, align:'center', fontSize:12, bold:true, color:'FFFFFF' });
      s.addText(m.label, { x:1.3, y:y+0.06, w:8.9, h:0.5, fontFace:'Arial', fontSize:12.5, color: m.done ? GRAY : WHITE, valign:'middle' });
      s.addText(m.owner==='client' ? 'YOUR MOVE' : 'STRUCTTECH', { x:10.4, y:y+0.14, w:2.1, h:0.34, align:'center', fontFace:'Courier New', fontSize:9, color: m.owner==='client' ? BLUE : ORANGE });
      y += 0.74;
    });
    s.addText(done + '/' + lvl.milestones.length + ' COMPLETE', { x:10.4, y:0.55, w:2.3, h:0.35, align:'right', fontFace:'Courier New', fontSize:12, color: done===lvl.milestones.length ? GREEN : GRAY });
  });

  // Close slide
  var s9 = p.addSlide(); s9.background = { color: DARK };
  s9.addText('ONE LEVEL AT A TIME.', { x:0.6, y:2.6, w:12.1, h:0.9, align:'center', fontFace:'Arial', fontSize:38, bold:true, color:WHITE });
  s9.addText('Get Level 1 running. Prove it. Then we attack the next one.', { x:0.6, y:3.6, w:12.1, h:0.5, align:'center', fontFace:'Arial', fontSize:16, color:GRAY });
  s9.addText('Jacob Walker · StructTech LLC · 937.467.2660 · structtek.com', { x:0.6, y:6.6, w:12.1, h:0.4, align:'center', fontFace:'Courier New', fontSize:11, color:GRAY });

  p.writeFile({ fileName: (r.company||'client').replace(/[^a-z0-9]/gi,'_') + '_StructTech_Roadmap.pptx' });
}
